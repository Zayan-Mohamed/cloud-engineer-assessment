version: "3.8"

services:
  # NOTE: No local 'db' service — the app connects to Amazon RDS via DB_HOST in .env

  backend:
    build: ./backend
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - static_files:/app/static

  frontend:
    build:
      context: ./frontend
      args:
        # API requests from the browser go through nginx at /api/
        VITE_API_BASE_URL: /api/
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/static
    depends_on:
      - backend
      - frontend

volumes:
  static_files:
